server:
  port: 8111

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/trendy?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: "temporary_email@gmail.com"
    password: "temporary_password"
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  security:
    oauth2:
      client:
        registration:
          # 작성일: 2026-06-05, 작성시간: 15:18
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email

          # 작성일: 2026-06-05, 작성시간: 15:18
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8111/login/oauth2/code/kakao
            scope: profile_nickname, account_email
            client-name: Kakao

        provider:
          # 작성일: 2026-06-05, 작성시간: 15:18
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: eW91ci10cmVuZHktc3BvdC1zZWNyZXQta2V5LXRlbXBvcmFyeS12YWx1ZS0xMjM0NTY3ODkwCg==
  access-expiration: 1800000       # 30분
  refresh-expiration: 1209600000   # 14일

aws:
  s3:
    bucket: "temporary-s3-bucket-name"
    region: ap-northeast-2
  access-key: "temporary_aws_access_key"
  secret-key: "temporary_aws_secret_key"

portone:
  api-secret: "temporary_portone_api_key"
  imp-key: "temporary_portone_api_secret"

crawling:
  popga-sitemap: "https://example.com/sitemap.xml"
  schedule: "0 0 6 * * *"         # 매일 새벽 6시

public-api:
  tour:
    base-url: "https://apis.data.go.kr/B551011/KorService1"
    service-key: "temporary_mock_key_until_i_get_real_one"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs