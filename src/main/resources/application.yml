server:
  port: 8111

spring:
  profiles:
    include: secret

  datasource:
    url: jdbc:mysql://localhost:3306/final_project?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: cf
            client-secret: j
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope: profile_nickname, account_email
          google:
            client-id: 8
            client-secret: G
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: profile, email
          naver:
            client-id:  dff    # 👈 네이버에서 발급받은 Client ID 입력
            client-secret:  pXff # 👈 네이버에서 발급받은 Client Secret 입력
            redirect-uri: "{baseUrl}/login/oauth2/code/naver" # 추가
            authorization-grant-type: authorization_code # 추가
            client-name: Naver #추가
            scope: # 추가
              - name #추가
              - email # 추가

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver: #추가
            authorization-uri: https://nid.naver.com/oauth2.0/authorize #추가
            token-uri: https://nid.naver.com/oauth2.0/token #추가
            user-info-uri: https://openapi.naver.com/v1/nid/me #추가
            user-name-attribute: response #추가
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000       # 30분
  refresh-expiration: 1209600000   # 14일

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ap-northeast-2
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}

portone:
  api-secret: G

crawling:
  popga-sitemap: https://popga.co.kr/sitemap.xml
  schedule: "0 0 6 * * *"         # 매일 새벽 6시

public-api:
  tour:
    base-url: https://api.kcisa.kr/openapi/CNV_060/request
    service-key: ${TOUR_SERVICE_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
